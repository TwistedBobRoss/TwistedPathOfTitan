name: Fix invalid GSA section labels

on:
  pull_request:
    paths:
      - .github/workflows/fix-gsa-section-names.yml

permissions:
  contents: write

jobs:
  fix-sections:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const path = 'blueprints/path-of-titans-gsa-captain-gecko.json';
            const current = await github.rest.repos.getContent({ owner, repo, path, ref: 'main' });
            let text = Buffer.from(current.data.content, 'base64').toString('utf8');
            const replacements = [
              ['"section":"Growth & Death"', '"section":"Growth and Death"'],
              ['"section":"World & Survival"', '"section":"World and Survival"'],
              ['"section":"Caves & Nesting"', '"section":"Caves and Nesting"']
            ];
            for (const [from, to] of replacements) text = text.replaceAll(from, to);
            const invalid = [...text.matchAll(/"section":"([^"]*)"/g)]
              .map(match => match[1])
              .filter(value => !/^[a-zA-Z0-9._ \-]+$/.test(value));
            if (invalid.length) {
              core.setFailed(`Invalid section names remain: ${[...new Set(invalid)].join(', ')}`);
              return;
            }
            JSON.parse(text);
            await github.rest.repos.createOrUpdateFileContents({
              owner,
              repo,
              path,
              message: 'fix: use GSA-safe parameter section labels',
              content: Buffer.from(text, 'utf8').toString('base64'),
              sha: current.data.sha,
              branch: 'main'
            });