name: Apply one-time Path of Titans listing correction

on:
  push:
    paths:
      - .github/workflows/one-time-pot-listing-fix.yml
  pull_request:
    paths:
      - README.md
      - .github/workflows/one-time-pot-listing-fix.yml

permissions:
  contents: write

jobs:
  update-blueprint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const path = 'blueprints/path-of-titans-gsa-captain-gecko.json';
            const repo = context.repo.repo;
            const owner = context.repo.owner;
            const current = await github.rest.repos.getContent({ owner, repo, path, ref: 'main' });
            let text = Buffer.from(current.data.content, 'base64').toString('utf8');
            if (text.includes('community_server_listing_ip')) return;
            const oldArgs = '-QueryPort={gameserver.query_port} -QueryIP=0.0.0.0 -RconPort={gameserver.rcon_port} -RconIP=0.0.0.0 -MULTIHOME=0.0.0.0 -log';
            const newArgs = '-QueryPort={gameserver.query_port} -QueryIP=0.0.0.0 -RconPort={gameserver.rcon_port} -RconIP=0.0.0.0 -MULTIHOME=0.0.0.0 -ServerListIP={config_parameter id="community_server_listing_ip"} -log';
            if (!text.includes(oldArgs)) {
              core.setFailed('Original launch parameter string was not found.');
              return;
            }
            text = text.replace(oldArgs, newArgs);
            const marker = '        "map": {';
            const setting = '        "community_server_listing_ip": {"name":"Show as Community Server","info":"Public IP used when registering this server in the Path of Titans Community Server list. Leave the default value in place to show online; clear it only for a direct-connect/private server.","section":"Server Setup","type":"text","content":"{machine.ip}"},\n';
            if (!text.includes(marker)) {
              core.setFailed('Original parameter insertion marker was not found.');
              return;
            }
            text = text.replace(marker, setting + marker);
            JSON.parse(text);
            await github.rest.repos.createOrUpdateFileContents({
              owner, repo, path,
              message: 'fix: add Path of Titans Community Server listing setting',
              content: Buffer.from(text, 'utf8').toString('base64'),
              sha: current.data.sha,
              branch: 'main'
            });
            // Triggered from an internal verification pull request.