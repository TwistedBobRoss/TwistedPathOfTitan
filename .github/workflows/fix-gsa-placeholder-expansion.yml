name: Apply GSA placeholder expansion fix

on:
  pull_request:

permissions:
  contents: write

jobs:
  repair-blueprint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const blueprintPath = 'blueprints/path-of-titans-gsa-captain-gecko.json';
            const workflowPath = '.github/workflows/fix-gsa-placeholder-expansion.yml';
            const blueprint = await github.rest.repos.getContent({ owner, repo, path: blueprintPath, ref: 'main' });
            let text = Buffer.from(blueprint.data.content, 'base64').toString('utf8');

            const replacements = [
              [
                '      "GUID": "{config_parameter id=\\"server_guid\\"}",',
                '      "GUID": "{helper.uuid}",'
              ],
              [
                '      "EXTRA_ARGS": "{config_parameter id=\\"launch_params\\"}"',
                '      "EXTRA_ARGS": "-QueryPort={gameserver.query_port} -QueryIP=0.0.0.0 -RconPort={gameserver.rcon_port} -RconIP=0.0.0.0 -MULTIHOME=0.0.0.0 -ServerListIP={machine.ip} -log {config_parameter id=\\"launch_params\\"}"'
              ],
              [
                '        "server_guid": {"name":"Server GUID","info":"Unique UUIDv4 for this Path of Titans server. Keep {helper.uuid} unless you need a fixed identity across rebuilds.","section":"Server Setup","type":"text","content":"{helper.uuid}"},\n',
                ''
              ],
              [
                '        "launch_params": {"name":"Extra Launch Arguments","info":"Passed through Captain Gecko pot-server EXTRA_ARGS. Default wires Source Query and Source RCON ports/IPs to GSA. Leave unchanged unless troubleshooting.","section":"Server Setup","type":"text","content":"-QueryPort={gameserver.query_port} -QueryIP=0.0.0.0 -RconPort={gameserver.rcon_port} -RconIP=0.0.0.0 -MULTIHOME=0.0.0.0 -ServerListIP={config_parameter id=\\"community_server_listing_ip\\"} -log"},',
                '        "launch_params": {"name":"Extra Launch Arguments","info":"Optional extra Path of Titans launch arguments. Required GSA ports, public listing IP, and logging are already added by the blueprint; add only additional literal arguments here.","section":"Server Setup","type":"text","content":""},'
              ],
              [
                '        "community_server_listing_ip": {"name":"Show as Community Server","info":"Public IP used when registering this server in the Path of Titans Community Server list. Leave the default value in place to show online; clear it only for a direct-connect/private server.","section":"Server Setup","type":"text","content":"{machine.ip}"},\n',
                ''
              ]
            ];

            for (const [from, to] of replacements) {
              if (!text.includes(from)) {
                core.setFailed(`Expected blueprint text was not found: ${from.slice(0, 80)}`);
                return;
              }
              text = text.replace(from, to);
            }

            if (text.includes('{config_parameter id="server_guid"}') || text.includes('"EXTRA_ARGS": "{config_parameter id="launch_params"}"')) {
              core.setFailed('Nested placeholder references remain in Docker environment fields.');
              return;
            }
            JSON.parse(text);

            await github.rest.repos.createOrUpdateFileContents({
              owner,
              repo,
              path: blueprintPath,
              message: 'fix: expand Path of Titans GSA variables directly',
              content: Buffer.from(text, 'utf8').toString('base64'),
              sha: blueprint.data.sha,
              branch: 'main'
            });

            const workflow = await github.rest.repos.getContent({ owner, repo, path: workflowPath, ref: 'main' });
            await github.rest.repos.deleteFile({
              owner,
              repo,
              path: workflowPath,
              message: 'chore: remove one-time GSA placeholder repair workflow',
              sha: workflow.data.sha,
              branch: 'main'
            });