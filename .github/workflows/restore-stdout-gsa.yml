name: Restore Path of Titans stdout log capture

on:
  pull_request:
    paths:
      - stdout-trigger.txt

permissions:
  contents: write

jobs:
  update-blueprint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const path = 'blueprints/path-of-titans-gsa-captain-gecko.json';
            const current = await github.rest.repos.getContent({ owner, repo, path, ref: 'main' });
            let text = Buffer.from(current.data.content, 'base64').toString('utf8');
            const oldArgs = '"EXTRA_ARGS": "-QueryPort={gameserver.query_port} -QueryIP=0.0.0.0 -RconPort={gameserver.rcon_port} -RconIP=0.0.0.0 -MULTIHOME=0.0.0.0 -ServerListIP={machine.ip} -log {config_parameter id=\\"launch_params\\"}"';
            const newArgs = '"EXTRA_ARGS": "-QueryPort={gameserver.query_port} -QueryIP=0.0.0.0 -RconPort={gameserver.rcon_port} -RconIP=0.0.0.0 -MULTIHOME=0.0.0.0 -ServerListIP={machine.ip} -log -stdout {config_parameter id=\\"launch_params\\"}"';
            if (!text.includes(oldArgs)) {
              core.setFailed('Expected EXTRA_ARGS value was not found.');
              return;
            }
            text = text.replace(oldArgs, newArgs);
            JSON.parse(text);
            await github.rest.repos.createOrUpdateFileContents({
              owner,
              repo,
              path,
              message: 'fix: restore stdout logging for GSA',
              content: Buffer.from(text, 'utf8').toString('base64'),
              sha: current.data.sha,
              branch: 'main'
            });