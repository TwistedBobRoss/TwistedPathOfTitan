name: Clean temporary repair artifacts

on:
  pull_request:

permissions:
  contents: write

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const paths = [
              '.github/workflows/fix-gsa-section-command.yml',
              '.github/workflows/run-gsa-section-fix.yml',
              'automation-trigger.txt',
              'dummy'
            ];
            for (const path of paths) {
              try {
                const file = await github.rest.repos.getContent({ owner, repo, path, ref: 'main' });
                await github.rest.repos.deleteFile({
                  owner,
                  repo,
                  path,
                  message: 'chore: remove temporary repair artifact',
                  sha: file.data.sha,
                  branch: 'main'
                });
              } catch (error) {
                if (error.status !== 404) throw error;
              }
            }